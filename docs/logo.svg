<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="Caissa">
  <defs>
    <linearGradient id="knightGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="board" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#1f2937" opacity="0.07"/>
      <rect x="10" y="10" width="10" height="10" fill="#1f2937" opacity="0.07"/>
    </pattern>
    <style>
      .wordmark { font-family: Georgia, "Times New Roman", serif; font-weight: 700; fill: #0f172a; }
      .tagline  { font-family: Georgia, serif; font-style: italic; fill: #475569; }
      .knight   { font-family: "Segoe UI Symbol", "DejaVu Sans", "Apple Symbols", serif; fill: url(#knightGradient); }
      @media (prefers-color-scheme: dark) {
        .wordmark { fill: #f1f5f9; }
        .tagline  { fill: #94a3b8; }
        .knight   { fill: #f1f5f9; }
      }
    </style>
  </defs>

  <!-- subtle 8x8 board pattern in the background corner -->
  <rect x="0" y="0" width="200" height="200" fill="url(#board)"/>

  <!-- knight glyph -->
  <text x="20" y="170" class="knight" font-size="180">♞</text>

  <!-- wordmark -->
  <text x="230" y="115" class="wordmark" font-size="84" letter-spacing="2">Caissa</text>

  <!-- tagline -->
  <text x="232" y="155" class="tagline" font-size="20">muse of chess · text-mode chess in C++</text>
</svg>
